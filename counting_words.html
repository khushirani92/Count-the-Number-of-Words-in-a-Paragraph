<!DOCTYPE html>
<html>
<head>
  <title>Smart Text Analyzer</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(to right, #2193b0, #ffffff);
    }

    .box {
      width: 520px;
      padding: 25px;
      border-radius: 15px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #0077b6;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 16px;
    }

    .stats {
      margin-top: 15px;
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }

    .highlight {
      margin-top: 10px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 8px;
      font-size: 14px;
      word-wrap: break-word;
    }

    .word {
      background: #90e0ef;
      padding: 2px 4px;
      margin: 2px;
      border-radius: 4px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Smart Text Analyzer 📊</h1>

    <textarea id="text" oninput="analyzeText()" placeholder="Type your paragraph here..."></textarea>

    <div class="stats" id="stats"></div>

    <div class="highlight" id="highlight"></div>
  </div>

  <script>
    function analyzeText() {
      let text = document.getElementById("text").value.trim();

      // WORDS
      let words = text === "" ? [] : text.split(/\s+/);

      // CHARACTERS
      let characters = text.length;

      // SENTENCES
      let sentences = text === "" ? [] : text.split(/[.!?]+/).filter(s => s.trim().length > 0);

      // READING TIME (average 200 words per minute)
      let readingTime = words.length / 200;

      // HIGHLIGHT WORDS
      let highlighted = words.map(w => `<span class="word">${w}</span>`).join(" ");

      document.getElementById("stats").innerHTML =
        "📝 Words: " + words.length + "<br>" +
        "🔤 Characters: " + characters + "<br>" +
        "📌 Sentences: " + sentences.length + "<br>" +
        "⏱ Reading Time: " + readingTime.toFixed(2) + " min";

      document.getElementById("highlight").innerHTML =
        highlighted || "Start typing to see analysis...";
    }
  </script>

</body>
</html>
